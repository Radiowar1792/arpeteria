name: arpeteria

services:
  # ───────────────────────── Base de données ─────────────────────────
  database:
    image: postgres:16-alpine
    restart: unless-stopped
    volumes:
      - pgdata:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_DATABASE}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_DATABASE}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks: [internal]

  # ───────────────────────── CMS Directus ─────────────────────────
  directus:
    image: directus/directus:11
    restart: unless-stopped
    depends_on:
      database:
        condition: service_healthy
    # Permet à un Flow Directus (Webhook / Request URL) de joindre le service de rebuild
    # automatique qui tourne sur l'hôte, hors Docker (voir scripts/rebuild-webhook.mjs et
    # docs/deploiement.md) via http://host.docker.internal:<port>/rebuild.
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      # ⚠️ Ouvert sur toutes les interfaces (pas seulement 127.0.0.1) pour permettre
      # un reverse proxy externe (ex. Nginx Proxy Manager sur un autre hôte) de router
      # un sous-domaine dessus (voir DIRECTUS_PUBLIC_URL/.env). En prod avec Caddy en
      # façade unique (voir docs/deploiement.md), repasser en "127.0.0.1:8055:8055".
      - "8055:8055"
    volumes:
      - directus_uploads:/directus/uploads
      - ./cms/extensions:/directus/extensions
    environment:
      SECRET: ${DIRECTUS_SECRET}
      ADMIN_EMAIL: ${DIRECTUS_ADMIN_EMAIL}
      ADMIN_PASSWORD: ${DIRECTUS_ADMIN_PASSWORD}
      DB_CLIENT: pg
      DB_HOST: database
      DB_PORT: 5432
      DB_DATABASE: ${DB_DATABASE}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      PUBLIC_URL: ${DIRECTUS_PUBLIC_URL:-https://admin.arpeteria.fr}
      CORS_ENABLED: "true"
      CORS_ORIGIN: ${SITE_URL:-https://arpeteria.fr}
      # Autorise le site (autre sous-domaine) à afficher les PDF en <iframe> (LecteurPDF.astro) :
      # sans ça, Directus refuse par défaut l'affichage cross-origin dans une frame.
      CONTENT_SECURITY_POLICY_DIRECTIVES__FRAME_ANCESTORS: "'self' ${SITE_URL:-https://arpeteria.fr}"
      FILES_MAX_UPLOAD_SIZE: 200mb
      CACHE_ENABLED: "true"
      CACHE_STORE: memory
      # Sans ça (false par défaut), les écritures ne vident pas le cache : les
      # changements mettent jusqu'au TTL du cache à se refléter, y compris dans
      # l'UI Directus elle-même (qui interroge la même API mise en cache).
      CACHE_AUTO_PURGE: "true"
    networks: [internal, web]

  # ───────────────────────── Site statique (Astro) ─────────────────────────
  # Variante recommandée : héberger ces fichiers sur Cloudflare Pages et supprimer ce service.
  web:
    build:
      context: ./apps/web
      # `docker build` tourne dans un réseau isolé par défaut : sans cette ligne,
      # `RUN npm run build` ne pourrait pas joindre Directus pendant le build.
      # BuildKit (builder par défaut depuis Docker récent) ne supporte pas les réseaux
      # bridge personnalisés définis par compose (ex. "web") pour le build — seuls
      # "host"/"none"/"default" sont supportés nativement. On utilise donc "host" et
      # on joint Directus via son port publié sur l'hôte (127.0.0.1:8055) plutôt que
      # via le nom de service "directus" (non résolvable en mode réseau host).
      # Le conteneur directus doit donc déjà tourner avant de builder web (voir docs/deploiement.md).
      network: host
      args:
        DIRECTUS_URL: http://127.0.0.1:8055
        DIRECTUS_PUBLIC_URL: ${DIRECTUS_PUBLIC_URL:-https://admin.arpeteria.fr}
        DIRECTUS_STATIC_TOKEN: ${DIRECTUS_STATIC_TOKEN}
        # URL canonique du site (sitemap, balises canonical/OG) — voir astro.config.mjs
        # et lib/seo.ts, qui lisent la même variable.
        SITE_URL: ${SITE_URL:-https://arpeteria.fr}
        # Script de suivi Umami (voir docs/deploiement.md, Étape 16) — laisser
        # UMAMI_WEBSITE_ID vide tant que le site n'est pas créé dans Umami : aucun script
        # n'est alors injecté.
        PUBLIC_UMAMI_URL: ${UMAMI_PUBLIC_URL:-https://stats.arpeteria.fr}
        PUBLIC_UMAMI_WEBSITE_ID: ${UMAMI_WEBSITE_ID:-}
        # Change à chaque publication pour forcer Docker à relancer `npm run build` (donc à
        # requêter Directus à nouveau) plutôt que de resservir la couche de cache précédente.
        # Voir docs/deploiement.md — ne pas lancer `docker compose up -d --build web` sans ça.
        CACHEBUST: ${CACHEBUST:-1}
    restart: unless-stopped
    depends_on: [directus]
    networks: [web]
    ports:
      # ⚠️ Exposé directement (reverse proxy externe type Nginx Proxy Manager en façade)
      # tant qu'on ne passe pas par le "caddy" de ce repo. En prod avec Caddy en façade
      # unique (voir docs/deploiement.md), retirer ce bloc "ports".
      - "8080:80"

  # ───────────────────────── Umami — statistiques du site ─────────────────────────
  umami:
    image: ghcr.io/umami-software/umami:postgresql-latest
    restart: unless-stopped
    ports:
      # ⚠️ Ouvert sur toutes les interfaces pour qu'un reverse proxy externe (ex. Nginx
      # Proxy Manager) puisse router un sous-domaine dessus, comme pour web/directus.
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://umami:${UMAMI_DB_PASSWORD}@umami-database:5432/umami
      DATABASE_TYPE: postgresql
      APP_SECRET: ${UMAMI_APP_SECRET}
    depends_on:
      umami-database:
        condition: service_healthy
    networks: [umami]

  umami-database:
    image: postgres:16-alpine
    restart: unless-stopped
    volumes:
      - umami_pgdata:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: umami
      POSTGRES_USER: umami
      POSTGRES_PASSWORD: ${UMAMI_DB_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U umami -d umami"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks: [umami]

  # ───────────────────────── Reverse proxy ─────────────────────────
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infra/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    networks: [web]

volumes:
  pgdata:
  directus_uploads:
  caddy_data:
  caddy_config:
  umami_pgdata:

networks:
  internal:
  web:
  umami:
